services:
  - type: web
    name: ai-sql-analyst-backend
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn backend.api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: ENVIRONMENT
        value: PRODUCTION

      - key: GEMINI_API_KEY
        sync: false